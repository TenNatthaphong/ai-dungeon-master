
networks:
  dm_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  milvus_data:
  scylla_data:

services:

  # --- databases ---

  postgres:
    image: postgres:16
    container_name: dm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dmuser
      POSTGRES_PASSWORD: dmpassword
      POSTGRES_DB: dungeon_master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dm_network

  redis:
    image: redis:7-alpine
    container_name: dm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dm_network

  scylladb:
    image: scylladb/scylla:5.4
    container_name: dm_scylla
    restart: unless-stopped
    command:
      - --smp 1
      - --memory 512M
      - --overprovisioned 1
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    networks:
      - dm_network

  # --- kafka ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dm_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - dm_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dm_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - dm_network

  # --- milvus ---

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: dm_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    networks:
      - dm_network

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: dm_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data
    networks:
      - dm_network

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: dm_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - dm_network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: dm_keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/dungeon_master
      KC_DB_USERNAME: dmuser
      KC_DB_PASSWORD: dmpassword
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      - postgres
    networks:
      - dm_network